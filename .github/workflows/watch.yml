name: refurb-watch

on:
  schedule:
    # 20分ごと（UTC基準。GitHubのcronは混雑時ずれる場合あり）
    - cron: "*/20 * * * *"
  workflow_dispatch: {} # 手動実行も可

permissions:
  contents: write # seen.json を commit back するため

concurrency:
  group: refurb-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        env:
          X_APP_KEY: ${{ secrets.X_APP_KEY }}
          X_APP_SECRET: ${{ secrets.X_APP_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node index.mjs

      - name: Commit state
        run: |
          git config user.name "refurb-watch-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet seen.json; then
            git add seen.json
            git commit -m "chore: update stock state [skip ci]"
            git push
          else
            echo "no state change"
          fi
